name: Deploy

# Required repository secrets:
# VPS_HOST
# VPS_USER
# VPS_SSH_KEY
# APP_ADMIN_USERNAME
# APP_ADMIN_PASSWORD
#
# Optional repository variables:
# VPS_PORT=22
# APP_DEBUG=false
# DEPLOY_DATA_DIR=/opt/hah-open-cookbook/data
# APP_DATA_DIR=/app/data

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CONTAINER_NAME: hah-open-cookbook

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare artifact names
        id: artifact
        shell: bash
        run: |
          IMAGE_NAME="${CONTAINER_NAME}:${GITHUB_SHA}"
          ARCHIVE_NAME="hah-open-cookbook-${GITHUB_SHA}.tar.gz"
          LOCAL_ARCHIVE="/tmp/${ARCHIVE_NAME}"
          REMOTE_ARCHIVE="/tmp/${ARCHIVE_NAME}"

          echo "image=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "local_archive=${LOCAL_ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "remote_archive=${REMOTE_ARCHIVE}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.artifact.outputs.image }}
        run: docker build -t "${IMAGE_NAME}" .

      - name: Pack Docker image
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.artifact.outputs.image }}
          LOCAL_ARCHIVE: ${{ steps.artifact.outputs.local_archive }}
        run: docker save "${IMAGE_NAME}" | gzip > "${LOCAL_ARCHIVE}"

      - name: Configure SSH access
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Copy image archive to VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_PORT || '22' }}
          LOCAL_ARCHIVE: ${{ steps.artifact.outputs.local_archive }}
          REMOTE_ARCHIVE: ${{ steps.artifact.outputs.remote_archive }}
        run: scp -P "${VPS_PORT}" "${LOCAL_ARCHIVE}" "${VPS_USER}@${VPS_HOST}:${REMOTE_ARCHIVE}"

      - name: Deploy on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_PORT || '22' }}
          APP_DEBUG: ${{ vars.APP_DEBUG || 'false' }}
          DEPLOY_DATA_DIR: ${{ vars.DEPLOY_DATA_DIR || '/opt/hah-open-cookbook/data' }}
          APP_DATA_DIR: ${{ vars.APP_DATA_DIR || '/app/data' }}
          APP_ADMIN_USERNAME: ${{ secrets.APP_ADMIN_USERNAME }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
          IMAGE: ${{ steps.artifact.outputs.image }}
          REMOTE_ARCHIVE: ${{ steps.artifact.outputs.remote_archive }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
        run: |
          IMAGE_B64="$(printf '%s' "${IMAGE}" | base64 -w 0)"
          REMOTE_ARCHIVE_B64="$(printf '%s' "${REMOTE_ARCHIVE}" | base64 -w 0)"
          APP_DEBUG_B64="$(printf '%s' "${APP_DEBUG}" | base64 -w 0)"
          DEPLOY_DATA_DIR_B64="$(printf '%s' "${DEPLOY_DATA_DIR}" | base64 -w 0)"
          APP_DATA_DIR_B64="$(printf '%s' "${APP_DATA_DIR}" | base64 -w 0)"
          APP_ADMIN_USERNAME_B64="$(printf '%s' "${APP_ADMIN_USERNAME}" | base64 -w 0)"
          APP_ADMIN_PASSWORD_B64="$(printf '%s' "${APP_ADMIN_PASSWORD}" | base64 -w 0)"
          CONTAINER_NAME_B64="$(printf '%s' "${CONTAINER_NAME}" | base64 -w 0)"

          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" \
            "IMAGE_B64='${IMAGE_B64}' \
            REMOTE_ARCHIVE_B64='${REMOTE_ARCHIVE_B64}' \
            APP_DEBUG_B64='${APP_DEBUG_B64}' \
            DEPLOY_DATA_DIR_B64='${DEPLOY_DATA_DIR_B64}' \
            APP_DATA_DIR_B64='${APP_DATA_DIR_B64}' \
            APP_ADMIN_USERNAME_B64='${APP_ADMIN_USERNAME_B64}' \
            APP_ADMIN_PASSWORD_B64='${APP_ADMIN_PASSWORD_B64}' \
            CONTAINER_NAME_B64='${CONTAINER_NAME_B64}' \
            bash -se" <<'EOF'
          set -eu

          decode() {
            printf '%s' "$1" | base64 -d
          }

          IMAGE="$(decode "${IMAGE_B64}")"
          REMOTE_ARCHIVE="$(decode "${REMOTE_ARCHIVE_B64}")"
          APP_DEBUG="$(decode "${APP_DEBUG_B64}")"
          DEPLOY_DATA_DIR="$(decode "${DEPLOY_DATA_DIR_B64}")"
          APP_DATA_DIR="$(decode "${APP_DATA_DIR_B64}")"
          APP_ADMIN_USERNAME="$(decode "${APP_ADMIN_USERNAME_B64}")"
          APP_ADMIN_PASSWORD="$(decode "${APP_ADMIN_PASSWORD_B64}")"
          CONTAINER_NAME="$(decode "${CONTAINER_NAME_B64}")"

          mkdir -p "${DEPLOY_DATA_DIR}"

          gzip -dc "${REMOTE_ARCHIVE}" | docker load
          rm -f "${REMOTE_ARCHIVE}"

          docker stop "${CONTAINER_NAME}" 2>/dev/null || true
          docker rm "${CONTAINER_NAME}" 2>/dev/null || true

          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p 127.0.0.1:80:80 \
            -v "${DEPLOY_DATA_DIR}:${APP_DATA_DIR}" \
            -e DEBUG="${APP_DEBUG}" \
            -e DATA_DIR="${APP_DATA_DIR}" \
            -e ADMIN_USERNAME="${APP_ADMIN_USERNAME}" \
            -e ADMIN_PASSWORD="${APP_ADMIN_PASSWORD}" \
            "${IMAGE}"
          EOF
